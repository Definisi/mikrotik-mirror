name: Sync MikroTik Mirror

on:
  push:
    paths:
      - "mirror.py"
      - ".github/workflows/sync.yml"
  schedule:
    # Run every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      version:
        description: "Specific version to sync (leave empty for auto-discover)"
        required: false
      arch:
        description: "Specific architecture to sync (leave empty for all)"
        required: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build download args
        id: args
        run: |
          ARGS="--output ./downloads --verify --generate-index --workers 8 --retry 3"
          if [ -n "${{ github.event.inputs.version }}" ]; then
            ARGS="$ARGS --version ${{ github.event.inputs.version }}"
          else
            ARGS="$ARGS --auto-discover"
          fi
          if [ -n "${{ github.event.inputs.arch }}" ]; then
            ARGS="$ARGS --arch ${{ github.event.inputs.arch }}"
          fi
          echo "args=$ARGS" >> "$GITHUB_OUTPUT"

      - name: Run mirror sync
        run: python mirror.py ${{ steps.args.outputs.args }}

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          if git diff --cached --quiet; then
            echo "No new files to commit"
          else
            NEW_FILES=$(git diff --cached --name-only | wc -l)
            git commit -m "sync: update mirror — ${NEW_FILES} file(s) changed $(date -u +%Y-%m-%d)"
            git push
          fi
